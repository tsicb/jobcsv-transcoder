<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>求人CSV《コード⇔日本語》変換ツール</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js"></script>
</head>
<body>
  <header class="hero">
    <div>
      <h1>求人CSV《コード⇔日本語》変換ツール</h1>
      <p class="lead">CSVをアップロードすると、選んだ列をコードから日本語へ、または日本語からコードへ変換して自動でダウンロードします。</p>
    </div>
  </header>

  <main class="container">
    <section class="card controlsCard">
      <div class="controlBlock">
        <h2>変換モード</h2>
        <div class="segmented" role="radiogroup" aria-label="変換モード">
          <label><input type="radio" name="direction" value="decode" checked><span>コード → 日本語</span></label>
          <label><input type="radio" name="direction" value="encode"><span>日本語 → コード</span></label>
        </div>
      </div>
      <div class="controlBlock">
        <h2>出力モード</h2>
        <div class="segmented" role="radiogroup" aria-label="出力モード">
          <label><input type="radio" name="outputMode" value="overwrite" checked><span>列を上書き</span></label>
          <label><input type="radio" name="outputMode" value="append"><span>変換後列を追加</span></label>
        </div>
      </div>
      <div class="controlBlock" id="breakModeBlock">
        <h2>改行の扱い</h2>
        <div class="segmented" role="radiogroup" aria-label="改行の扱い">
          <label><input type="radio" name="decodeBreakMode" value="br" checked><span>&lt;BR&gt;のまま</span></label>
          <label><input type="radio" name="decodeBreakMode" value="newline"><span>改行にする</span></label>
        </div>
        <p id="breakModeNote" class="miniNote">コード→日本語のときだけ選べます</p>
      </div>
    </section>

    <section class="card columnCard">
      <div>
        <h2>変換列を選ぶ</h2>
        <p id="columnSummary" class="subText">変換設定を読み込み中...</p>
      </div>
      <button id="openColumnModal" class="secondary" type="button">変換列を選ぶ</button>
    </section>

    <section class="card uploadCard">
      <h2>CSVをアップロード</h2>
      <label class="fileDrop" for="csvFile" id="dropZone">
        <input id="csvFile" type="file" accept=".csv,text/csv">
        <span>ここにCSVをドラッグ＆ドロップ</span>
        <small>またはクリックしてファイルを選択。選択後、自動で変換してダウンロードします。</small>
        <em id="fileName">未選択</em>
      </label>
    </section>

    <section class="card statusCard">
      <h2>処理状況</h2>
      <div id="status" class="status">マスタ読み込み中...</div>
      <div id="summary" class="summary"></div>
      <a id="downloadLink" class="download hidden" href="#" download>変換済CSVを再ダウンロード</a>
      <button id="downloadLogButton" class="secondary hidden" type="button">エラーログCSVをダウンロード</button>
    </section>

    <section class="card hidden" id="errorSection">
      <h2>未変換・注意一覧</h2>
      <p class="note">未変換値は元の値を残しています。複数候補がある場合は自動変換していません。</p>
      <div class="tableWrap">
        <table id="errorTable">
          <thead>
            <tr>
              <th>行</th>
              <th>列</th>
              <th>入力値</th>
              <th>理由</th>
              <th>候補</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="columnModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="columnModalTitle">
    <div class="modalBackdrop" data-close-modal></div>
    <div class="modalPanel">
      <div class="modalHead">
        <div>
          <h2 id="columnModalTitle">変換列を選ぶ</h2>
          <p class="subText">チェックした列だけ変換します。初期状態はすべて選択です。</p>
        </div>
        <button id="closeColumnModal" class="iconButton" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modalActions">
        <button id="selectAllColumns" class="secondary" type="button">すべて選択</button>
        <button id="clearAllColumns" class="secondary" type="button">すべて選択解除</button>
      </div>
      <div id="columnList" class="checkList"></div>
      <div class="modalFoot">
        <button id="applyColumnModal" class="primary" type="button">この内容で閉じる</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
